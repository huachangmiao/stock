<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A股板块资金流向</title>
    <style>
:root {
  --bg: #f2f4f7;
  --panel: #ffffff;
  --ink: #20242a;
  --muted: #687281;
  --line: #dfe5ee;
  --line-strong: #aeb8c6;
  --red: #b34f5a;
  --green: #2f7468;
  --amber: #f3cf4e;
  --blue: #2d6f98;
  --shadow: 0 18px 50px rgba(30, 38, 50, 0.12);
}

* {
  box-sizing: border-box;
}

[hidden] {
  display: none !important;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  color: var(--ink);
  background:
    linear-gradient(180deg, #2b2d31 0 82px, transparent 82px),
    var(--bg);
  font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
  letter-spacing: 0;
}

button,
select,
input {
  font: inherit;
}

.app-shell {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 24px 20px 34px;
}

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
  min-width: 170px;
}

.brand strong {
  font-size: 18px;
  color: #ffffff;
}

.brand span {
  color: rgba(255, 255, 255, 0.72);
  font-size: 13px;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.segmented {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 3px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
}

.segment,
.refresh-button {
  min-height: 34px;
  border: 0;
  border-radius: 6px;
  color: #f6f8fb;
  background: transparent;
  cursor: pointer;
}

.segment {
  min-width: 54px;
  padding: 0 12px;
}

.segment.active {
  color: #1e242b;
  background: #ffffff;
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
}

.control {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 40px;
  padding: 0 8px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.78);
  font-size: 13px;
  white-space: nowrap;
}

.control select,
.control input {
  height: 28px;
  border: 0;
  border-radius: 6px;
  padding: 0 26px 0 9px;
  color: #17202a;
  background: #ffffff;
}

.control input[type="date"] {
  width: 128px;
  padding-right: 8px;
}

.refresh-button {
  padding: 0 15px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  background: rgba(255, 255, 255, 0.12);
  font-weight: 700;
}

.refresh-button:hover,
.segment:not(.active):hover {
  background: rgba(255, 255, 255, 0.2);
}

.chart-card {
  overflow: hidden;
  border: 1px solid rgba(105, 116, 132, 0.2);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.chart-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  padding: 28px 32px 12px;
}

.chart-heading h1 {
  margin: 0;
  color: var(--amber);
  font-size: clamp(30px, 5vw, 54px);
  line-height: 1.08;
  font-weight: 900;
  letter-spacing: 0;
  -webkit-text-stroke: 1.2px #161719;
  text-shadow:
    0 2px 0 #161719,
    0 4px 10px rgba(0, 0, 0, 0.16);
}

.chart-heading p {
  margin: 12px 0 0;
  color: #4e5968;
  font-size: 16px;
  font-weight: 700;
}

.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
  padding-top: 4px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 0 11px;
  border: 1px solid #e3e7ee;
  border-radius: 8px;
  background: #ffffff;
  color: #606b79;
  box-shadow: 0 5px 14px rgba(31, 42, 56, 0.06);
  font-size: 13px;
  white-space: nowrap;
}

.badge.strong {
  color: #20242a;
  font-weight: 800;
}

.timeline-panel {
  margin: 2px 32px 8px;
  padding: 13px 16px 10px;
  border: 1px solid #e1e7ef;
  border-radius: 8px;
  background: #fbfcfe;
}

.filter-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 32px 8px;
  min-height: 30px;
  color: #687281;
  font-size: 13px;
}

.filter-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-width: 0;
}

.filter-tag,
.clear-filters {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  border: 1px solid #e2c2c7;
  border-radius: 6px;
  background: #fff8f9;
  color: #a3424d;
  font-size: 12px;
}

.filter-tag {
  gap: 5px;
  padding: 0 7px;
}

.filter-tag button,
.clear-filters {
  cursor: pointer;
}

.filter-tag button {
  width: 16px;
  height: 16px;
  border: 0;
  border-radius: 50%;
  color: inherit;
  background: transparent;
  line-height: 1;
}

.filter-tag button:hover,
.clear-filters:hover {
  background: #f6e1e4;
}

.clear-filters {
  padding: 0 8px;
}

.timeline-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 9px;
}

.timeline-meta div {
  min-width: 0;
}

.timeline-meta strong {
  display: inline-block;
  margin-right: 10px;
  color: #20242a;
  font-size: 15px;
}

.timeline-meta span {
  color: var(--muted);
  font-size: 13px;
}

.live-button {
  flex: 0 0 auto;
  min-height: 30px;
  padding: 0 12px;
  border: 1px solid #cfd8e4;
  border-radius: 6px;
  color: #243141;
  background: #ffffff;
  cursor: pointer;
  font-weight: 700;
}

.live-button.active {
  border-color: rgba(184, 73, 85, 0.32);
  color: var(--red);
  background: #fff7f7;
}

.time-slider {
  display: block;
  width: 100%;
  height: 24px;
  margin: 0;
  background: transparent;
  accent-color: var(--red);
  cursor: pointer;
  -webkit-appearance: none;
}

.time-slider:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

.time-slider::-webkit-slider-runnable-track {
  height: 6px;
  border-radius: 999px;
  background:
    linear-gradient(90deg, var(--red) 0 var(--progress, 100%), #d8e0ea var(--progress, 100%) 100%);
}

.time-slider::-webkit-slider-thumb {
  width: 18px;
  height: 18px;
  margin-top: -6px;
  border: 3px solid #ffffff;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 3px 10px rgba(33, 43, 56, 0.24);
  -webkit-appearance: none;
}

.time-slider::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  background: #d8e0ea;
}

.time-slider::-moz-range-progress {
  height: 6px;
  border-radius: 999px;
  background: var(--red);
}

.time-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border: 3px solid #ffffff;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 3px 10px rgba(33, 43, 56, 0.24);
}

.timeline-ticks {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  margin-top: 4px;
  color: #6c7685;
  font-size: 12px;
}

.timeline-ticks span {
  text-align: center;
}

.timeline-ticks span:first-child {
  text-align: left;
}

.timeline-ticks span:last-child {
  text-align: right;
}

.canvas-wrap {
  position: relative;
  padding: 0 18px;
}

#flowCanvas {
  display: block;
  width: 100%;
  height: clamp(410px, calc(100vh - 390px), 620px);
  min-height: 0;
  max-height: 620px;
}

.overlay {
  position: absolute;
  inset: 0 18px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #3d4652;
  background: rgba(255, 255, 255, 0.78);
  font-weight: 800;
}

.overlay.show {
  display: flex;
}

.spinner {
  width: 22px;
  height: 22px;
  border: 3px solid #d9dee6;
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.tooltip {
  position: fixed;
  z-index: 5;
  max-width: 260px;
  padding: 9px 11px;
  border: 1px solid rgba(31, 42, 56, 0.12);
  border-radius: 8px;
  color: #18202a;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 12px 34px rgba(24, 34, 48, 0.18);
  pointer-events: none;
  font-size: 13px;
}

.tooltip strong {
  display: block;
  margin-bottom: 4px;
  font-size: 14px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  border-top: 1px solid var(--line);
  background: #fbfcfe;
}

.summary-item {
  min-width: 0;
  padding: 14px 20px;
  border-right: 1px solid var(--line);
}

.summary-item:last-child {
  border-right: 0;
}

.summary-item span {
  display: block;
  margin-bottom: 5px;
  color: var(--muted);
  font-size: 12px;
}

.summary-item strong {
  display: block;
  overflow: hidden;
  color: #20242a;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 17px;
}

.summary-item strong.positive {
  color: var(--red);
}

.summary-item strong.negative {
  color: var(--green);
}

.disclaimer {
  margin: 0;
  padding: 14px 20px 18px;
  color: #757f8c;
  text-align: center;
  font-size: 14px;
  background: #ffffff;
}

@media (max-width: 860px) {
  .app-shell {
    padding: 14px 10px 24px;
  }

  .toolbar {
    align-items: stretch;
    flex-direction: column;
    margin-bottom: 10px;
  }

  .brand {
    min-width: 0;
    justify-content: space-between;
  }

  .controls {
    justify-content: flex-start;
    overflow-x: auto;
    padding-bottom: 2px;
    flex-wrap: nowrap;
  }

  .chart-heading {
    flex-direction: column;
    padding: 22px 18px 8px;
  }

  .badges {
    justify-content: flex-start;
  }

  .timeline-panel {
    margin: 2px 18px 8px;
  }

  .canvas-wrap {
    padding: 0 8px;
  }

  #flowCanvas {
    height: clamp(430px, calc(100vh - 320px), 620px);
    min-height: 0;
  }

  .overlay {
    inset: 0 8px;
  }

  .summary-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .summary-item:nth-child(2) {
    border-right: 0;
  }

  .summary-item:nth-child(-n + 2) {
    border-bottom: 1px solid var(--line);
  }
}

@media (max-height: 820px) and (min-width: 861px) {
  .app-shell {
    padding-top: 14px;
  }

  .toolbar {
    margin-bottom: 8px;
  }

  .chart-heading {
    padding: 18px 32px 8px;
  }

  .chart-heading h1 {
    font-size: clamp(30px, 4vw, 44px);
  }

  .chart-heading p {
    margin-top: 7px;
    font-size: 14px;
  }

  .badge {
    min-height: 28px;
  }

  .timeline-panel {
    margin-top: 0;
    margin-bottom: 4px;
    padding: 9px 16px 8px;
  }

  .timeline-meta {
    margin-bottom: 8px;
  }

  .timeline-ticks {
    margin-top: 2px;
  }

  .filter-strip {
    margin-bottom: 4px;
  }
}

@media (max-width: 520px) {
  body {
    background:
      linear-gradient(180deg, #2b2d31 0 128px, transparent 128px),
      var(--bg);
  }

  .brand {
    display: block;
  }

  .brand span {
    display: block;
    margin-top: 4px;
  }

  .chart-heading h1 {
    font-size: 31px;
  }

  .chart-heading p {
    font-size: 14px;
  }

  .summary-item {
    padding: 12px 14px;
  }

  .timeline-meta {
    align-items: flex-start;
    flex-direction: column;
    gap: 8px;
  }

  .live-button {
    width: 100%;
  }
}

    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div class="brand">
          <strong>板块资金流</strong>
          <span id="statusText">等待数据</span>
        </div>

        <div class="controls" aria-label="资金流向控制">
          <div class="segmented" role="tablist" aria-label="板块类型">
            <button class="segment active" type="button" data-type="concept">概念</button>
            <button class="segment" type="button" data-type="volume">成交量最大前30</button>
          </div>

          <label class="control">
            <span>刷新周期</span>
            <select id="refreshSelect">
              <option value="15">15秒</option>
              <option value="30" selected>30秒</option>
              <option value="60">60秒</option>
              <option value="0">暂停</option>
            </select>
          </label>

          <button class="refresh-button" type="button" id="refreshButton">刷新</button>
        </div>
      </header>

      <section class="chart-card" aria-label="板块资金流向图">
        <div class="chart-heading">
          <div>
            <h1 id="chartTitle">A股板块资金流向</h1>
            <p id="chartSubtitle">主力资金净流入 · 概念</p>
          </div>
          <div class="badges">
            <span class="badge" id="dateBadge">最近交易日</span>
            <span class="badge strong" id="timeBadge">时间 --:--</span>
          </div>
        </div>

        <div class="timeline-panel" aria-label="分时时间轴">
          <div class="timeline-meta">
            <div>
              <strong id="timelineTime">时间 --:--</strong>
              <span id="timelineMode">跟随最新</span>
            </div>
            <button class="live-button" type="button" id="liveButton">跟随最新</button>
          </div>
          <input id="timeSlider" class="time-slider" type="range" min="0" max="240" value="240" step="1" disabled>
          <div class="timeline-ticks" aria-hidden="true">
            <span>09:30</span>
            <span>10:30</span>
            <span>11:30</span>
            <span>14:00</span>
            <span>15:00</span>
          </div>
        </div>

        <div class="filter-strip" id="filterStrip" hidden>
          <span>已过滤</span>
          <div class="filter-tags" id="filterTags"></div>
          <button class="clear-filters" type="button" id="clearFilters">清空</button>
        </div>

        <div class="canvas-wrap">
          <canvas id="flowCanvas" aria-label="A股板块主力资金分时曲线"></canvas>
          <div class="overlay" id="overlay">
            <div class="spinner" aria-hidden="true"></div>
            <span id="overlayText">正在加载行情数据</span>
          </div>
          <div class="tooltip" id="tooltip" hidden></div>
        </div>

        <div class="summary-grid" aria-label="资金流向摘要">
          <div class="summary-item">
            <span id="summaryTopLabel">最大流入</span>
            <strong id="topInflow">--</strong>
          </div>
          <div class="summary-item">
            <span id="summaryBottomLabel">最大流出</span>
            <strong id="topOutflow">--</strong>
          </div>
          <div class="summary-item">
            <span id="summaryTotalLabel">合计净额</span>
            <strong id="netTotal">--</strong>
          </div>
          <div class="summary-item">
            <span id="summaryBreadthLabel">流入占比</span>
            <strong id="breadth">--</strong>
          </div>
        </div>

        <p class="disclaimer">根据东方财富公开行情接口整理，仅供参考，不作为买卖依据。</p>
      </section>
    </main>

function jsonp(url, timeoutMs = 12000) {
  return new Promise((resolve, reject) => {
    const callbackName = `emFlowCb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const separator = url.includes("?") ? "&" : "?";
    const script = document.createElement("script");
    let settled = false;

    const clean = () => {
      script.remove();
      window[callbackName] = () => {};
      window.setTimeout(() => {
        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }
      }, 1500);
    };

    const timer = window.setTimeout(() => {
      if (settled) return;
      settled = true;
      clean();
      reject(new Error("接口请求超时"));
    }, timeoutMs);

    window[callbackName] = (payload) => {
      if (settled) return;
      settled = true;
      window.clearTimeout(timer);
      clean();
      resolve(payload);
    };

    script.onerror = () => {
      if (settled) return;
      settled = true;
      window.clearTimeout(timer);
      clean();
      reject(new Error("接口请求失败"));
    };

    script.src = `${url}${separator}cb=${callbackName}`;
    document.head.appendChild(script);
  });
}

async function localApi(path, params) {
  const search = new URLSearchParams(params);
  const response = await fetch(`/api/${path}?${search.toString()}`, {
    cache: "no-store",
  });
  if (!response.ok) {
    const payload = await response.json().catch(() => ({}));
    throw new Error(payload.error || "本地数据代理请求失败");
  }
  return response.json();
}

function canUseLocalApi() {
  return location.protocol === "http:" || location.protocol === "https:";
}

function buildUrl(path, params, baseUrl = EASTMONEY_API) {
  const search = new URLSearchParams(params);
  return `${baseUrl}/${path}?${search.toString()}`;
}

async function requestPayload(localPath, localParams, eastmoneyPath, eastmoneyParams) {
  if (canUseLocalApi()) {
    try {
      return await localApi(localPath, localParams);
    } catch (error) {
      console.warn(error);
    }
  }
  return jsonp(buildUrl(eastmoneyPath, eastmoneyParams));
}

async function fetchRank(typeKey, order, count) {
  const pageSize = Math.min(100, Math.max(1, count));
  const firstPayload = await fetchRankPage(typeKey, order, 1, pageSize);
  const firstRows = getRankRows(firstPayload);
  const total = Number(firstPayload?.data?.total) || firstRows.length;
  const pageCount = Math.max(1, Math.ceil(Math.min(count, total) / pageSize));
  const restPayloads = await Promise.all(
    Array.from({ length: pageCount - 1 }, (_, index) =>
      fetchRankPage(typeKey, order, index + 2, pageSize),
    ),
  );
  const rows = [firstPayload, ...restPayloads].flatMap(getRankRows);
  return normalizeRankRows(rows);
}

async function fetchRankPage(typeKey, order, page, pageSize) {
  const type = MARKET_TYPES[typeKey];
  const eastmoneyParams = {
    fid: "f62",
    po: order,
    pz: pageSize,
    pn: page,
    np: 1,
    fltt: 2,
    invt: 2,
    ut: EASTMONEY_UT,
    fs: type.fs,
    fields: "f12,f14,f2,f3,f5,f6,f62,f184,f124",
  };

  const payload = await jsonp(buildUrl("clist/get", eastmoneyParams));
  if (payload.rc !== 0 || !payload.data || !Array.isArray(payload.data.diff)) {
    throw new Error("板块排行数据不可用");
  }

  return payload;
}

function getRankRows(payload) {
  return Array.isArray(payload?.data?.diff) ? payload.data.diff : [];
}

function normalizeRankRows(rows) {
  const seen = new Set();
  return rows
    .filter((item) => item && item.f12 && Number.isFinite(Number(item.f62)))
    .map((item) => {
      const code = item.f12;
      const rawName = item.f14 || code;
      return {
        code,
        name: BOARD_NAME_ALIASES[code] || rawName,
        rawName,
        rankValue: Number(item.f62),
        quoteChange: Number(item.f3),
        flowRatio: Number(item.f184),
        volume: Number(item.f5),
        amount: Number(item.f6),
        updateTs: Number(item.f124),
      };
    })
    .filter((board) => {
      if (seen.has(board.code)) return false;
      seen.add(board.code);
      return true;
    });
}

async function fetchBoards(typeKey, limit) {
  if (typeKey === "volume") {
    return fetchTopVolumeBoards();
  }

  const half = Math.ceil(limit / 2);
  const rankCount = 1000;
  const negativeRankCount = 360;
  const [positiveRaw, negativeRaw] = await Promise.all([
    fetchRank(typeKey, 1, rankCount),
    fetchRank(typeKey, 0, negativeRankCount),
  ]);
  const positive = filterBoardsForType(typeKey, positiveRaw);
  const negative = filterBoardsForType(typeKey, negativeRaw);
  const pinnedThemes =
    typeKey === "concept" ? pickPinnedThemes([...positiveRaw, ...negativeRaw]) : [];
  const remainingLimit = Math.max(0, limit - pinnedThemes.length);
  const positiveLimit = Math.ceil(remainingLimit / 2);
  const negativeLimit = remainingLimit - positiveLimit;

  return mergeBoards({
    pinned: pinnedThemes.slice(0, limit),
    positive: positive.slice(0, positiveLimit + 8),
    negative: negative.slice(0, negativeLimit + 8),
    limit,
  });
}

async function fetchTopVolumeBoards() {
  const candidates = filterBoardsForType("concept", await fetchRank("concept", 1, 1000));
  const ranked = candidates
    .filter((board) => Number.isFinite(board.volume))
    .map((board) => ({
      ...board,
      volumeRankValue: board.volume,
      amountRankValue: board.amount,
    }));

  return ranked
    .sort((a, b) => (b.volumeRankValue || 0) - (a.volumeRankValue || 0))
    .slice(0, DEFAULT_LIMIT);
}

function filterBoardsForType(typeKey, boards) {
  if (typeKey !== "concept") return boards;
  return boards.filter(isThemeBoard);
}

function isThemeBoard(board) {
  const name = board.rawName || board.name || "";
  if (EXCLUDED_THEME_CODES.has(board.code) || EXCLUDED_THEME_NAME_PATTERN.test(name)) {
    return false;
  }
  return PINNED_THEME_CODES.includes(board.code) || ETF_THEME_NAME_PATTERN.test(name);
}

function pickPinnedThemes(boards) {
  const byCode = new Map(
    filterBoardsForType("concept", boards).map((board) => [board.code, board]),
  );
  return PINNED_THEME_CODES
    .map((code) => byCode.get(code))
    .filter(Boolean);
}

function mergeBoards({ pinned, positive, negative, limit }) {
  const seen = new Set();
  const selected = [];
  const add = (board) => {
    if (!board || seen.has(board.code) || selected.length >= limit) return;
    seen.add(board.code);
    selected.push(board);
  };

  pinned.forEach(add);
  positive.forEach(add);
  negative.forEach(add);

  if (selected.length < limit) {
    [...positive, ...negative]
      .sort((a, b) => Math.abs(b.rankValue) - Math.abs(a.rankValue))
      .forEach(add);
  }

  return selected.slice(0, limit);
}

async function fetchTrendRows(board) {
  const params = {
    secid: `90.${board.code}`,
    fields1: "f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11,f12,f13",
    fields2: "f51,f52,f53,f54,f55,f56,f57,f58",
    ndays: 1,
    iscr: 0,
    iscca: 0,
    ut: EASTMONEY_UT,
  };
  const payload = await jsonp(buildUrl("stock/trends2/get", params));
  if (payload.rc !== 0 || !Array.isArray(payload?.data?.trends)) {
    throw new Error(`${board.name} 分时行情不可用`);
  }
  return payload.data.trends;
}

async function fetchTrendLine(board) {
  const rows = await fetchTrendRows(board);
  const targetDate = [...new Set(rows.map((row) => String(row).slice(0, 10)))].sort().pop();
  const rawPoints = rows
    .map((row) => {
      const parts = String(row).split(",");
      const stamp = parts[0];
      const date = stamp.slice(0, 10);
      if (date !== targetDate) return null;
      const time = stamp.slice(11, 16);
      const close = Number(parts[2]);
      const fallbackClose = Number(parts[1]);
      const price = Number.isFinite(close) && close > 0 ? close : fallbackClose;
      return {
        stamp,
        date,
        time,
        minuteIndex: toTradeMinuteIndex(time),
        price,
        volume: Number(parts[5]) || 0,
        amount: Number(parts[6]) || 0,
      };
    })
    .filter((point) => point && point.minuteIndex >= 0 && Number.isFinite(point.price) && point.price > 0);

  if (rawPoints.length === 0) {
    throw new Error(`${board.name} 分时行情为空`);
  }

  const basePrice = rawPoints[0].price;
  const points = rawPoints.map((point) => ({
    ...point,
    value: ((point.price - basePrice) / basePrice) * 100,
  }));
  const latest = points[points.length - 1];
  return {
    ...board,
    latestValue: latest.value,
    latestTime: latest.time,
    latestDate: latest.date,
    points,
  };
}

async function fetchMetricLine(board) {
  return state.metric === "flow" ? fetchFlowLine(board) : fetchTrendLine(board);
}

async function fetchFlowLine(board) {
  const eastmoneyParams = {
    lmt: 0,
    klt: 1,
    secid: `90.${board.code}`,
    fields1: "f1,f2,f3,f7",
    fields2: "f51,f52,f53,f54,f55",
    ut: EASTMONEY_UT,
  };
  const payload = await requestPayload(
    "flow",
    { code: board.code },
    "stock/fflow/kline/get",
    eastmoneyParams,
  );
  const rows = payload?.data?.klines;
  if (payload.rc !== 0 || !Array.isArray(rows) || rows.length === 0) {
    throw new Error(`${board.name} 分时数据不可用`);
  }

  const points = rows
    .map((row) => {
      const parts = String(row).split(",");
      const value = Number(parts[1]);
      return {
        stamp: parts[0],
        date: parts[0].slice(0, 10),
        time: parts[0].slice(11, 16),
        minuteIndex: toTradeMinuteIndex(parts[0].slice(11, 16)),
        value,
      };
    })
    .filter((point) => point.minuteIndex >= 0 && Number.isFinite(point.value));

  if (points.length === 0) {
    throw new Error(`${board.name} 分时数据为空`);
  }

  const latest = points[points.length - 1];
  return {
    ...board,
    latestValue: latest.value,
    latestTime: latest.time,
    latestDate: latest.date,
    points,
  };
}

async function mapLimit(items, concurrency, iterator) {
  const results = new Array(items.length);
  let cursor = 0;
  const workers = Array.from({ length: Math.min(concurrency, items.length) }, async () => {
    while (cursor < items.length) {
      const index = cursor;
      cursor += 1;
      try {
        results[index] = await iterator(items[index], index);
      } catch (error) {
        results[index] = null;
        console.warn(error);
      }
    }
  });
  await Promise.all(workers);
  return results;
}

function isLatestSelectedDate() {
  return true;
}

function getMetricMode() {
  return state.type === "concept" ? "flow" : "trend";
}

function syncSelectedDateFromLines() {
  const latest = getLatestPoint();
  if (!latest?.date) return;
  state.selectedDate = latest.date;
}

async function loadData(showOverlay = false) {
  const requestId = ++state.requestId;
  state.loading = true;
  setOverlay(showOverlay || state.lines.length === 0, "正在加载行情数据");
  setStatus("更新中...");

  try {
    state.metric = getMetricMode();
    const boards = await fetchBoards(state.type, state.limit);
    const lines = (await mapLimit(boards, 6, fetchMetricLine)).filter(Boolean);
    if (requestId !== state.requestId) return;
    if (lines.length === 0) throw new Error("没有可绘制的行情数据");

    assignColors(lines);
    state.lines = lines.sort((a, b) => b.latestValue - a.latestValue);
    pruneFilters();
    renderFilterControls();
    state.lastError = "";
    syncSelectedDateFromLines();
    syncTimelineAfterData();
    updateHeader();
    updateSummary();
    draw();
    setOverlay(false);
    scheduleRefresh();
  } catch (error) {
    if (requestId !== state.requestId) return;
    state.lastError = error.message || "加载失败";
    setStatus(state.lastError);
    setOverlay(true, `${state.lastError}，请稍后重试`);
  } finally {
    if (requestId === state.requestId) {
      state.loading = false;
    }
  }
}

function assignColors(lines) {
  [...lines]
    .sort((a, b) => b.latestValue - a.latestValue)
    .forEach((line, index) => {
      line.color = FLOW_COLORS[index % FLOW_COLORS.length];
    });
}

function pruneFilters() {
  state.filters = state.filters.filter((filter) =>
    state.lines.some((line) => lineMatchesFilter(line, filter)),
  );
}

function renderFilterControls() {
  els.filterTags.replaceChildren();
  els.filterStrip.hidden = state.filters.length === 0;

  state.filters.forEach((filter) => {
    const tag = document.createElement("span");
    tag.className = "filter-tag";
    const text = document.createElement("span");
    text.textContent = filter;
    const remove = document.createElement("button");
    remove.type = "button";
    remove.setAttribute("aria-label", `取消过滤 ${filter}`);
    remove.textContent = "×";
    remove.addEventListener("click", () => removeFilter(filter));
    tag.append(text, remove);
    els.filterTags.appendChild(tag);
  });
}

function lineMatchesFilter(line, filter) {
  const haystack = `${line.name || ""} ${line.rawName || ""} ${line.code || ""}`.toLowerCase();
  return haystack.includes(filter.toLowerCase());
}

function removeFilter(filter) {
  state.filters = state.filters.filter((item) => item !== filter);
  afterFilterChange();
}

function addFilterForLine(line) {
  if (!line) return;
  if (!state.filters.some((item) => item.toLowerCase() === line.name.toLowerCase())) {
    state.filters.push(line.name);
  }
  state.hoveredLabelCode = "";
  state.hoveredCloseCode = "";
  els.tooltip.hidden = true;
  afterFilterChange();
}

function clearFilters() {
  state.filters = [];
  afterFilterChange();
}

function afterFilterChange() {
  renderFilterControls();
  updateHeader();
  updateSummary();
  draw();
}

function syncTimelineAfterData() {
  const minuteIndexes = state.lines.flatMap((line) => line.points.map((point) => point.minuteIndex));
  const min = Math.min(...minuteIndexes);
  const max = Math.max(...minuteIndexes);
  state.timelineMin = Number.isFinite(min) ? min : 0;
  state.timelineMax = Number.isFinite(max) ? max : 240;

  if (state.followLatest) {
    state.selectedMinuteIndex = state.timelineMax;
  } else {
    state.selectedMinuteIndex = clamp(state.timelineMin, state.timelineMax, state.selectedMinuteIndex);
  }

  els.timeSlider.disabled = false;
  els.timeSlider.min = String(state.timelineMin);
  els.timeSlider.max = String(state.timelineMax);
  updateTimelineUI();
}

function updateTimelineUI() {
  const min = Number(els.timeSlider.min || state.timelineMin);
  const max = Number(els.timeSlider.max || state.timelineMax);
  const value = clamp(min, max, state.selectedMinuteIndex);
  const progress = max === min ? 100 : ((value - min) / (max - min)) * 100;
  const time = tradeMinuteToTime(value);

  els.timeSlider.value = String(value);
  els.timeSlider.style.setProperty("--progress", `${progress}%`);
  els.timelineTime.textContent = `时间 ${time}`;
  els.timelineMode.textContent = state.followLatest ? "跟随当日最新时刻" : "手动回看历史时刻";
  els.liveButton.textContent = isLatestSelectedDate() && state.metric === "flow" ? "跟随最新" : "回到当日最新";
  els.liveButton.classList.toggle("active", state.followLatest);
}

function getCurrentMinuteIndex() {
  return clamp(state.timelineMin, state.timelineMax, state.selectedMinuteIndex);
}

function getPointAtOrBefore(line, minuteIndex) {
  let selected = null;
  for (const point of line.points) {
    if (point.minuteIndex > minuteIndex) break;
    selected = point;
  }
  return selected;
}

function getCurrentSnapshots() {
  const minuteIndex = getCurrentMinuteIndex();
  return getVisibleLines()
    .map((line) => {
      const point = getPointAtOrBefore(line, minuteIndex);
      if (!point) return null;
      return {
        ...line,
        currentPoint: point,
        currentValue: point.value,
      };
    })
    .filter(Boolean);
}

function getVisibleLines() {
  return state.lines.filter((line) => !isLineFiltered(line));
}

function isLineFiltered(line) {
  if (state.filters.length === 0) return false;
  return state.filters.some((filter) => lineMatchesFilter(line, filter));
}

function updateHeader() {
  const latest = getLatestPoint();
  const date = state.selectedDate || latest?.date || "";
  const time = state.lines.length ? tradeMinuteToTime(getCurrentMinuteIndex()) : "--:--";
  const titleDate = date ? formatMonthDay(date) : "A股";
  const phase = state.metric === "flow" ? (time >= "15:00" ? "收盘" : "盘中") : "分时";
  const type = MARKET_TYPES[state.type];
  const visibleCount = getVisibleLines().length;
  const filterText = state.filters.length ? ` · 已过滤${state.filters.length}项` : "";
  const mode = state.followLatest
    ? (state.metric === "flow" && isLatestSelectedDate() ? "实时跟随" : "当日最新")
    : "时间轴回看";
  const metricText = state.metric === "flow" ? "主力资金净流入" : "涨跌幅分时";

  els.chartTitle.textContent = `${titleDate} ${phase}${state.metric === "flow" ? "资金流向" : "行情走势"}`;
  els.chartSubtitle.textContent = `${metricText} · ${type.label} · ${visibleCount}条${filterText} · ${mode}`;
  els.dateBadge.textContent = date
    ? `${date} 最近交易日`
    : "最近交易日";
  els.timeBadge.textContent = `时间 ${time}`;
  updateTimelineUI();
  const refreshText =
    state.metric === "flow" && state.refreshSeconds ? `${state.refreshSeconds}秒刷新` : "当日行情";
  setStatus(`${refreshText} · ${mode}`);
}

function updateSummary() {
  const snapshots = getCurrentSnapshots();
  updateSummaryLabels();
  if (snapshots.length === 0) {
    setAmount(els.topInflow, "--", 0);
    setAmount(els.topOutflow, "--", 0);
    setAmount(els.netTotal, "--", 0);
    els.breadth.textContent = "--";
    return;
  }

  const sorted = [...snapshots].sort((a, b) => b.currentValue - a.currentValue);
  const topIn = sorted[0];
  const topOut = sorted[sorted.length - 1];
  const net = snapshots.reduce((sum, line) => sum + line.currentValue, 0);
  const positiveCount = snapshots.filter((line) => line.currentValue > 0).length;

  if (state.metric === "flow") {
    setAmount(els.topInflow, topIn ? `${topIn.name} ${formatValue(topIn.currentValue, true)}` : "--", topIn?.currentValue);
    setAmount(els.topOutflow, topOut ? `${topOut.name} ${formatValue(topOut.currentValue, true)}` : "--", topOut?.currentValue);
    setAmount(els.netTotal, formatValue(net, true), net);
  } else {
    const average = net / snapshots.length;
    setAmount(els.topInflow, topIn ? `${topIn.name} ${formatValue(topIn.currentValue, true)}` : "--", topIn?.currentValue);
    setAmount(els.topOutflow, topOut ? `${topOut.name} ${formatValue(topOut.currentValue, true)}` : "--", topOut?.currentValue);
    setAmount(els.netTotal, formatValue(average, true), average);
  }
  els.breadth.textContent = `${positiveCount}/${snapshots.length} (${Math.round((positiveCount / snapshots.length) * 100)}%)`;
}

function updateSummaryLabels() {
  if (state.metric === "flow") {
    els.summaryTopLabel.textContent = "最大流入";
    els.summaryBottomLabel.textContent = "最大流出";
    els.summaryTotalLabel.textContent = "合计净额";
    els.summaryBreadthLabel.textContent = "流入占比";
    return;
  }
  els.summaryTopLabel.textContent = "涨幅最大";
  els.summaryBottomLabel.textContent = "跌幅最大";
  els.summaryTotalLabel.textContent = "平均涨跌";
  els.summaryBreadthLabel.textContent = "上涨占比";
}

function setAmount(el, text, value) {
  el.textContent = text;
  el.classList.toggle("positive", Number(value) > 0);
  el.classList.toggle("negative", Number(value) < 0);
}

function setStatus(text) {
  els.statusText.textContent = text;
}

function setOverlay(show, text = "") {
  els.overlay.classList.toggle("show", show);
  if (text) els.overlayText.textContent = text;
}

function scheduleRefresh() {
  window.clearTimeout(state.timer);
  state.timer = null;
  if (!state.refreshSeconds || state.metric !== "flow" || !isLatestSelectedDate()) return;
  state.timer = window.setTimeout(() => loadData(false), state.refreshSeconds * 1000);
}

function draw() {
  const rect = els.canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  els.canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  els.canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const width = rect.width;
  const height = rect.height;
  ctx.clearRect(0, 0, width, height);
  drawCanvasBackground(width, height);

  const visibleLines = getVisibleLines();
  if (visibleLines.length === 0) {
    state.hitPoints = [];
    state.labelHitBoxes = [];
    return;
  }

  const layout = getLayout(width, height);
  const minuteIndex = getCurrentMinuteIndex();
  const scale = getValueScale(visibleLines, minuteIndex);
  drawAxes(layout, scale);
  drawLines(layout, scale, minuteIndex);
  drawCursor(layout, minuteIndex);
  drawLabels(layout, scale, minuteIndex);
}

function getLayout(width, height) {
  const compact = width < 680;
  const left = compact ? 50 : 72;
  const right = compact ? Math.min(148, width * 0.34) : 210;
  const top = compact ? 28 : 34;
  const bottom = compact ? 66 : 76;
  return {
    width,
    height,
    left,
    right,
    top,
    bottom,
    plotW: Math.max(120, width - left - right - 8),
    plotH: Math.max(240, height - top - bottom),
    labelX: width - right + 10,
    compact,
  };
}

function drawCanvasBackground(width, height) {
  ctx.save();
  const gradient = ctx.createLinearGradient(0, height * 0.52, 0, height);
  gradient.addColorStop(0, "rgba(255,255,255,0)");
  gradient.addColorStop(1, "rgba(211,221,218,0.72)");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
  ctx.restore();
}

function getValueScale(lines, minuteIndex = getCurrentMinuteIndex()) {
  const values = lines.flatMap((line) =>
    line.points
      .filter((point) => point.minuteIndex <= minuteIndex)
      .map((point) => toScaledValue(point.value)),
  );
  if (values.length === 0) values.push(0);
  const rawMin = Math.min(...values);
  const rawMax = Math.max(...values);
  return exactScale(rawMin, rawMax, 6);
}

function exactScale(min, max, tickCount) {
  let scaleMin = min;
  let scaleMax = max;
  if (scaleMin === scaleMax) {
    const pad = Math.max(Math.abs(scaleMin) * 0.05, state.metric === "flow" ? 1 : 0.1);
    scaleMin -= pad;
    scaleMax += pad;
  }
  const step = (scaleMax - scaleMin) / Math.max(1, tickCount - 1);
  const ticks = [];
  for (let index = 0; index < tickCount; index += 1) {
    ticks.push(Number((scaleMin + step * index).toFixed(8)));
  }
  return { min: scaleMin, max: scaleMax, ticks };
}

function drawAxes(layout, scale) {
  const { left, top, plotW, plotH, compact } = layout;
  const right = left + plotW;
  const bottom = top + plotH;

  ctx.save();
  ctx.strokeStyle = "#e7ebf1";
  ctx.lineWidth = 1;
  ctx.font = compact ? "12px Microsoft YaHei, Arial" : "14px Microsoft YaHei, Arial";
  ctx.textBaseline = "middle";
  ctx.textAlign = "right";
  ctx.fillStyle = "#697483";

  scale.ticks.forEach((tick) => {
    const y = scaledValueToY(tick, layout, scale);
    ctx.beginPath();
    ctx.moveTo(left, y);
    ctx.lineTo(right, y);
    ctx.stroke();
    ctx.fillText(formatAxisTick(tick), left - 8, y);
  });

  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = "#cfd6df";
  ctx.beginPath();
  ctx.moveTo(left, top);
  ctx.lineTo(left, bottom);
  ctx.stroke();
  ctx.setLineDash([]);

  const zeroY = valueToY(0, layout, scale);
  if (zeroY >= top && zeroY <= bottom) {
    ctx.strokeStyle = "#c8d0da";
    ctx.beginPath();
    ctx.moveTo(left, zeroY);
    ctx.lineTo(right, zeroY);
    ctx.stroke();
  }

  const ticks = [
    ["09:30", 0],
    ["10:30", 60],
    ["11:30", 120],
    ["14:00", 180],
    ["15:00", 240],
  ];
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillStyle = "#4f5966";
  ticks.forEach(([label, index]) => {
    const x = left + (index / 240) * plotW;
    ctx.fillText(label, x, bottom + 10);
  });

  ctx.restore();
}

function drawLines(layout, scale, minuteIndex) {
  state.hitPoints = [];
  const snapshots = getCurrentSnapshots();
  const sorted = snapshots.sort((a, b) => Math.abs(a.currentValue) - Math.abs(b.currentValue));

  ctx.save();
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  sorted.forEach((line) => {
    const points = line.points
      .filter((point) => point.minuteIndex <= minuteIndex)
      .map((point) => ({
        x: minuteToX(point.minuteIndex, layout),
        y: valueToY(point.value, layout, scale),
        point,
      }));

    if (points.length === 0) return;

    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = line.color;
    ctx.lineWidth = line.currentValue >= 0 ? 2.5 : 2.2;
    ctx.beginPath();
    points.forEach((point, index) => {
      if (index === 0) ctx.moveTo(point.x, point.y);
      else ctx.lineTo(point.x, point.y);
    });
    ctx.stroke();

    points.forEach((point, index) => {
      if (index % 4 === 0 || index === points.length - 1) {
        state.hitPoints.push({ ...point, line });
      }
    });
  });
  ctx.restore();
}

function drawCursor(layout, minuteIndex) {
  const x = minuteToX(minuteIndex, layout);
  const top = layout.top;
  const bottom = layout.top + layout.plotH;
  const plotRight = layout.left + layout.plotW;

  ctx.save();
  if (x < plotRight - 1) {
    ctx.fillStyle = "rgba(248, 250, 252, 0.68)";
    ctx.fillRect(x, top, plotRight - x, layout.plotH);
  }

  ctx.strokeStyle = "rgba(32, 36, 42, 0.22)";
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(x, top);
  ctx.lineTo(x, bottom);
  ctx.stroke();
  ctx.setLineDash([]);

  const text = tradeMinuteToTime(minuteIndex);
  ctx.font = layout.compact ? "12px Microsoft YaHei, Arial" : "13px Microsoft YaHei, Arial";
  const textWidth = ctx.measureText(text).width + 16;
  const labelX = clamp(layout.left, layout.left + layout.plotW - textWidth, x - textWidth / 2);
  roundRect(ctx, labelX, top + 8, textWidth, 24, 6);
  ctx.fillStyle = "rgba(255,255,255,0.94)";
  ctx.fill();
  ctx.strokeStyle = "rgba(32, 36, 42, 0.18)";
  ctx.stroke();
  ctx.fillStyle = "#2f3a48";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, labelX + textWidth / 2, top + 20);
  ctx.restore();
}

function drawLabels(layout, scale, minuteIndex) {
  const snapshots = getCurrentSnapshots();
  const labelHeight = getLabelHeight(layout, snapshots.length);
  const labels = snapshots
    .map((line) => {
      const end = line.currentPoint || getPointAtOrBefore(line, minuteIndex);
      if (!end) return null;
      const targetY = valueToY(end.value, layout, scale);
      const text = `${line.name} ${formatValue(end.value, true)}`;
      return {
        line,
        text,
        targetY,
        y: targetY,
        endX: minuteToX(end.minuteIndex, layout),
        endY: targetY,
      };
    })
    .filter(Boolean)
    .sort((a, b) => a.targetY - b.targetY);

  placeLabels(labels, layout, labelHeight);
  state.labels = labels;
  state.labelHitBoxes = [];

  ctx.save();
  ctx.font = `${clamp(8, 13, labelHeight - 1)}px Microsoft YaHei, Arial`;
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";
  const maxWidth = getFloatingLabelMaxWidth(layout);

  labels.forEach((label) => {
    const width = Math.min(Math.max(76, ctx.measureText(label.text).width + 15), maxWidth);
    const x = getFloatingLabelX(label.endX, width, layout);
    const y = label.y;
    const closeSize = Math.min(14, Math.max(8, labelHeight - 1));
    const isHovered = state.hoveredLabelCode === label.line.code;
    const closeBox = {
      x: x + width - closeSize - 2,
      y: y - labelHeight / 2 + 1,
      width: closeSize,
      height: closeSize,
    };
    const bounds = {
      x,
      y: y - labelHeight / 2,
      width,
      height: labelHeight,
    };
    state.labelHitBoxes.push({ line: label.line, bounds, closeBox });

    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(label.endX, label.endY, 3.2, 0, Math.PI * 2);
    ctx.fillStyle = label.line.color;
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = 1.4;
    ctx.stroke();

    roundRect(ctx, x, y - labelHeight / 2, width, labelHeight, Math.min(6, labelHeight / 3));
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.fill();
    ctx.strokeStyle = label.line.color;
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.fillStyle = label.line.color;
    ctx.fillText(trimText(label.text, width - (isHovered ? closeSize + 14 : 10)), x + 7, y);

    if (isHovered) {
      drawFilterCloseButton(closeBox, label.line.color, state.hoveredCloseCode === label.line.code);
    }
  });
  ctx.restore();
}

function drawFilterCloseButton(box, color, active) {
  const radius = Math.min(7, box.width / 2);
  ctx.save();
  roundRect(ctx, box.x, box.y, box.width, box.height, radius);
  ctx.fillStyle = active ? color : "rgba(255,255,255,0.98)";
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.1;
  ctx.stroke();

  ctx.strokeStyle = active ? "#ffffff" : color;
  ctx.lineWidth = 1.6;
  ctx.lineCap = "round";
  const pad = 4;
  ctx.beginPath();
  ctx.moveTo(box.x + pad, box.y + pad);
  ctx.lineTo(box.x + box.width - pad, box.y + box.height - pad);
  ctx.moveTo(box.x + box.width - pad, box.y + pad);
  ctx.lineTo(box.x + pad, box.y + box.height - pad);
  ctx.stroke();
  ctx.restore();
}

function getFloatingLabelMaxWidth(layout) {
  return layout.compact ? Math.max(72, layout.width * 0.31) : 190;
}

function getFloatingLabelX(endX, width, layout) {
  const gap = layout.compact ? 5 : 7;
  const minX = layout.left + 4;
  const maxX = layout.width - width - 8;
  return clamp(minX, maxX, endX + gap);
}

function getLabelHeight(layout, count = state.lines.length) {
  const gap = count > 24 ? 0 : 4;
  const available = layout.plotH - gap * Math.max(0, count - 1);
  return clamp(7, 22, available / Math.max(1, count));
}

function placeLabels(labels, layout, labelHeight) {
  let gap = labels.length > 24 ? 0 : 4;
  const minY = layout.top + labelHeight / 2;
  const maxY = layout.top + layout.plotH - labelHeight / 2;
  const count = labels.length;

  if (count <= 1) {
    labels.forEach((label) => {
      label.y = clamp(minY, maxY, label.targetY);
    });
    return;
  }

  const maxGap = Math.max(0, (maxY - minY) / (count - 1) - labelHeight);
  gap = clamp(0, gap, maxGap);
  const requiredHeight = count * labelHeight + (count - 1) * gap;
  const availableHeight = maxY - minY + labelHeight;

  if (requiredHeight >= availableHeight) {
    const step = count <= 1 ? 0 : (maxY - minY) / (count - 1);
    labels.forEach((label, index) => {
      label.y = minY + step * index;
    });
    return;
  }

  labels.forEach((label) => {
    label.y = clamp(minY, maxY, label.targetY);
  });

  for (let i = 1; i < count; i += 1) {
    labels[i].y = Math.max(labels[i].y, labels[i - 1].y + labelHeight + gap);
  }

  const overflow = labels[count - 1].y - maxY;
  if (overflow > 0) {
    labels.forEach((label) => {
      label.y -= overflow;
    });
  }

  const underflow = minY - labels[0].y;
  if (underflow > 0) {
    labels.forEach((label) => {
      label.y += underflow;
    });
  }

  for (let i = 1; i < count; i += 1) {
    labels[i].y = Math.max(labels[i].y, labels[i - 1].y + labelHeight + gap);
  }

  for (let i = count - 2; i >= 0; i -= 1) {
    labels[i].y = Math.min(labels[i].y, labels[i + 1].y - labelHeight - gap);
  }
}

function valueToY(value, layout, scale) {
  return scaledValueToY(toScaledValue(value), layout, scale);
}

function scaledValueToY(value, layout, scale) {
  const ratio = (value - scale.min) / (scale.max - scale.min || 1);
  const innerPad = Math.min(18, Math.max(8, layout.plotH * 0.035));
  const innerTop = layout.top + innerPad;
  const innerH = Math.max(1, layout.plotH - innerPad * 2);
  return innerTop + innerH - ratio * innerH;
}

function minuteToX(minuteIndex, layout) {
  return layout.left + (clamp(0, 240, minuteIndex) / 240) * layout.plotW;
}

function toTradeMinuteIndex(time) {
  const [hour, minute] = time.split(":").map(Number);
  const value = hour * 60 + minute;
  const morningStart = 9 * 60 + 30;
  const morningEnd = 11 * 60 + 30;
  const afternoonStart = 13 * 60;
  const afternoonEnd = 15 * 60;

  if (value >= morningStart && value <= morningEnd) {
    return value - morningStart;
  }
  if (value >= afternoonStart && value <= afternoonEnd) {
    return 120 + (value - afternoonStart);
  }
  return -1;
}

function tradeMinuteToTime(minuteIndex) {
  const index = clamp(0, 240, Math.round(minuteIndex));
  const totalMinutes = index <= 120
    ? 9 * 60 + 30 + index
    : 13 * 60 + (index - 120);
  const hour = Math.floor(totalMinutes / 60);
  const minute = totalMinutes % 60;
  return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
}

function parseInitialMinuteIndex() {
  const raw = new URLSearchParams(location.search).get("minute");
  if (!raw) return null;
  if (/^\d{1,2}:\d{2}$/.test(raw)) {
    const minuteIndex = toTradeMinuteIndex(raw.padStart(5, "0"));
    return minuteIndex >= 0 ? minuteIndex : null;
  }
  const numeric = Number(raw);
  return Number.isFinite(numeric) ? clamp(0, 240, Math.round(numeric)) : null;
}

function parseInitialType() {
  const raw = new URLSearchParams(location.search).get("type");
  return raw === "volume" ? "volume" : "concept";
}

function getLatestPoint() {
  return state.lines
    .flatMap((line) => line.points.slice(-1))
    .sort((a, b) => `${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`))[0];
}

function toScaledValue(value) {
  return state.metric === "flow" ? value / 1e8 : value;
}

function formatValue(value, sign = false) {
  return state.metric === "flow" ? formatAmount(value, sign) : formatPercent(value, sign);
}

function formatAmount(value, sign = false) {
  if (!Number.isFinite(value)) return "--";
  const abs = Math.abs(value);
  const prefix = sign && value > 0 ? "+" : value < 0 ? "-" : "";
  if (abs >= 1e8) return `${prefix}${(abs / 1e8).toFixed(2)}亿`;
  if (abs >= 1e4) return `${prefix}${(abs / 1e4).toFixed(2)}万`;
  return `${prefix}${abs.toFixed(0)}`;
}

function formatPercent(value, sign = false) {
  if (!Number.isFinite(value)) return "--";
  const prefix = sign && value > 0 ? "+" : "";
  return `${prefix}${value.toFixed(2)}%`;
}

function formatAxisTick(value) {
  return state.metric === "flow" ? `${formatAxisNumber(value)}亿` : `${formatAxisNumber(value)}%`;
}

function formatAxisNumber(value) {
  if (Math.abs(value) >= 100) return value.toFixed(0);
  if (Math.abs(value) >= 10) return value.toFixed(value % 1 === 0 ? 0 : 1);
  return value.toFixed(value % 1 === 0 ? 0 : 2);
}

function formatMonthDay(date) {
  const [, month, day] = date.split("-").map(Number);
  return `${month}月${day}日`;
}

function clamp(min, max, value) {
  return Math.min(max, Math.max(min, value));
}

function roundRect(context, x, y, width, height, radius) {
  context.beginPath();
  context.moveTo(x + radius, y);
  context.arcTo(x + width, y, x + width, y + height, radius);
  context.arcTo(x + width, y + height, x, y + height, radius);
  context.arcTo(x, y + height, x, y, radius);
  context.arcTo(x, y, x + width, y, radius);
  context.closePath();
}

function trimText(text, maxWidth) {
  if (ctx.measureText(text).width <= maxWidth) return text;
  let result = text;
  while (result.length > 2 && ctx.measureText(`${result}...`).width > maxWidth) {
    result = result.slice(0, -1);
  }
  return `${result}...`;
}

function getLabelHitAt(x, y) {
  for (let index = state.labelHitBoxes.length - 1; index >= 0; index -= 1) {
    const hit = state.labelHitBoxes[index];
    if (!pointInRect(x, y, hit.bounds)) continue;
    return {
      ...hit,
      inClose: pointInRect(x, y, hit.closeBox),
    };
  }
  return null;
}

function pointInRect(x, y, rect) {
  return (
    x >= rect.x &&
    x <= rect.x + rect.width &&
    y >= rect.y &&
    y <= rect.y + rect.height
  );
}

function updateHoveredLabel(hit) {
  const nextLabelCode = hit?.line?.code || "";
  const nextCloseCode = hit?.inClose ? nextLabelCode : "";
  const changed =
    state.hoveredLabelCode !== nextLabelCode || state.hoveredCloseCode !== nextCloseCode;
  state.hoveredLabelCode = nextLabelCode;
  state.hoveredCloseCode = nextCloseCode;
  if (changed) draw();
}

function handlePointerMove(event) {
  const rect = els.canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const labelHit = getLabelHitAt(x, y);

  if (labelHit) {
    updateHoveredLabel(labelHit);
    els.canvas.style.cursor = labelHit.inClose ? "pointer" : "default";
    els.tooltip.hidden = true;
    return;
  }

  updateHoveredLabel(null);
  els.canvas.style.cursor = "default";
  if (state.hitPoints.length === 0) return;

  let nearest = null;
  let nearestDistance = Infinity;

  state.hitPoints.forEach((hit) => {
    const distance = Math.hypot(hit.x - x, hit.y - y);
    if (distance < nearestDistance) {
      nearest = hit;
      nearestDistance = distance;
    }
  });

  if (!nearest || nearestDistance > 18) {
    els.tooltip.hidden = true;
    return;
  }

  els.tooltip.hidden = false;
  els.tooltip.style.left = `${event.clientX + 14}px`;
  els.tooltip.style.top = `${event.clientY + 14}px`;
  els.tooltip.innerHTML = `
    <strong style="color:${nearest.line.color}">${nearest.line.name}</strong>
    <div>${nearest.point.date} ${nearest.point.time}</div>
    <div>${state.metric === "flow" ? "主力净流入" : "涨跌幅"} ${formatValue(nearest.point.value, true)}</div>
  `;
}

function handleCanvasClick(event) {
  const rect = els.canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const labelHit = getLabelHitAt(x, y);
  if (!labelHit?.inClose) return;
  addFilterForLine(labelHit.line);
}

function bindEvents() {
  document.querySelectorAll(".segment").forEach((item) => {
    item.classList.toggle("active", item.dataset.type === state.type);
  });

  document.querySelectorAll(".segment").forEach((button) => {
    button.addEventListener("click", () => {
      if (button.dataset.type === state.type) return;
      state.type = button.dataset.type;
      document.querySelectorAll(".segment").forEach((item) => {
        item.classList.toggle("active", item === button);
      });
      loadData(true);
    });
  });

  els.refreshSelect.addEventListener("change", () => {
    state.refreshSeconds = Number(els.refreshSelect.value);
    updateHeader();
    scheduleRefresh();
  });

  els.refreshButton.addEventListener("click", () => {
    loadData(true);
  });

  els.clearFilters.addEventListener("click", clearFilters);

  els.timeSlider.addEventListener("input", () => {
    state.followLatest = false;
    state.selectedMinuteIndex = Number(els.timeSlider.value);
    updateTimelineUI();
    updateHeader();
    updateSummary();
    draw();
  });

  els.liveButton.addEventListener("click", () => {
    state.followLatest = true;
    state.selectedMinuteIndex = state.timelineMax;
    updateHeader();
    updateSummary();
    draw();
  });

  window.addEventListener("resize", () => draw());
  els.canvas.addEventListener("mousemove", handlePointerMove);
  els.canvas.addEventListener("click", handleCanvasClick);
  els.canvas.addEventListener("mouseleave", () => {
    updateHoveredLabel(null);
    els.canvas.style.cursor = "default";
    els.tooltip.hidden = true;
  });
}

bindEvents();
loadData(true);

    </script>
  </body>
</html>
